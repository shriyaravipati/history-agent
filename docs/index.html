<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quiet Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #1a1714;
    --ink-soft:  #4a4540;
    --ink-mute:  #9a9088;
    --paper:     #f7f4ee;
    --paper-warm:#ede8df;
    --rule:      #d8d0c4;
    --red:       #9b2335;
    --red-light: #f0e4e7;
    --serif:     'Playfair Display', Georgia, serif;
    --sans:      'Source Sans 3', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
  }

  .masthead {
    border-bottom: 3px double var(--ink);
    padding: 2.5rem 2rem 1.5rem;
    text-align: center;
  }
  .masthead-eyebrow {
    font-family: var(--sans);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 0.6rem;
  }
  .masthead h1 {
    font-family: var(--serif);
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .masthead-sub {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1rem;
    color: var(--ink-soft);
    margin-top: 0.5rem;
  }
  .masthead-count {
    display: inline-block;
    margin-top: 1.2rem;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 0.3rem 0.8rem;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-warm);
  }
  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    font-family: var(--sans);
    font-size: 0.85rem;
    padding: 0.5rem 0.75rem 0.5rem 2rem;
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--ink);
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--ink-soft); }
  .search-icon {
    position: absolute;
    left: 0.6rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-mute);
    font-size: 0.9rem;
    pointer-events: none;
  }
  .filter-group {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: var(--sans);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.35rem 0.7rem;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .sort-select {
    font-family: var(--sans);
    font-size: 0.75rem;
    padding: 0.4rem 0.6rem;
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    outline: none;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 360px;
    min-height: calc(100vh - 200px);
  }

  .entry-list {
    border-right: 1px solid var(--rule);
    overflow-y: auto;
  }
  .entry-item {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: background 0.1s;
  }
  .entry-item:hover { background: var(--paper-warm); }
  .entry-item.selected { background: var(--red-light); border-left: 3px solid var(--red); }
  .entry-num {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .entry-title {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    margin: 0.2rem 0;
  }
  .entry-meta {
    font-size: 0.72rem;
    color: var(--ink-mute);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.25rem;
  }
  .entry-meta span::before { content: '·'; margin-right: 0.4rem; }
  .entry-meta span:first-child::before { content: ''; margin-right: 0; }
  .tag {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.15rem 0.4rem;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    margin-right: 0.25rem;
    margin-top: 0.3rem;
  }

  .detail-pane {
    padding: 2rem 1.75rem;
    overflow-y: auto;
    position: sticky;
    top: 0;
    max-height: 100vh;
  }
  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60%;
    text-align: center;
    color: var(--ink-mute);
  }
  .detail-empty-glyph {
    font-family: var(--serif);
    font-size: 4rem;
    line-height: 1;
    margin-bottom: 1rem;
    opacity: 0.3;
  }
  .detail-empty p { font-style: italic; font-size: 0.9rem; }
  .detail-eyebrow {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 0.5rem;
  }
  .detail-title {
    font-family: var(--serif);
    font-size: clamp(1.3rem, 2.5vw, 1.7rem);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 0.75rem;
  }
  .detail-dateline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-soft);
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 1.25rem;
  }
  .detail-section-label {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 0.4rem;
    margin-top: 1.25rem;
  }
  .detail-section-label:first-of-type { margin-top: 0; }
  .detail-text {
    font-size: 0.9rem;
    line-height: 1.75;
    color: var(--ink-soft);
  }
  .detail-tags {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--rule);
  }
  .no-results {
    padding: 3rem 2rem;
    text-align: center;
    color: var(--ink-mute);
    font-style: italic;
  }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .detail-pane {
      position: fixed;
      inset: 0;
      background: var(--paper);
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      padding: 1.5rem 1.25rem;
      max-height: 100vh;
    }
    .detail-pane.open { transform: translateX(0); }
    .detail-close {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mute);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 1.5rem;
    }
  }
  @media (min-width: 701px) { .detail-close { display: none; } }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<header class="masthead">
  <p class="masthead-eyebrow">A daily archive of overlooked history</p>
  <h1>The Quiet Archive</h1>
  <p class="masthead-sub">The moments that changed everything — and were forgotten anyway</p>
  <span class="masthead-count" id="entry-count"></span>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search events, places, topics…" oninput="applyFilters()">
  </div>
  <div class="filter-group" id="era-filters">
    <button class="filter-btn active" onclick="setEra('all', this)">All eras</button>
    <button class="filter-btn" onclick="setEra('Ancient', this)">Ancient</button>
    <button class="filter-btn" onclick="setEra('Medieval', this)">Medieval</button>
    <button class="filter-btn" onclick="setEra('Early Modern', this)">Early Modern</button>
    <button class="filter-btn" onclick="setEra('Modern', this)">Modern</button>
    <button class="filter-btn" onclick="setEra('Contemporary', this)">Contemporary</button>
  </div>
  <select class="sort-select" id="sort-select" onchange="applyFilters()">
    <option value="newest">Newest first</option>
    <option value="oldest">Oldest first</option>
    <option value="az">A–Z</option>
  </select>
</div>

<div class="layout">
  <div class="entry-list" id="entry-list"></div>
  <div class="detail-pane" id="detail-pane">
    <button class="detail-close" onclick="closeDetail()">← Back to list</button>
    <div id="detail-content">
      <div class="detail-empty">
        <div class="detail-empty-glyph">§</div>
        <p>Select an entry to read</p>
      </div>
    </div>
  </div>
</div>

<script>
const ALL_ENTRIES = [{"title": "The Polynesian Women Who Navigated by Stars", "date": "circa 1000 AD", "location": "Tonga and Samoa, Pacific Ocean", "era": "Medieval", "topic_tags": ["navigation", "Pacific history", "indigenous knowledge"], "event_summary": "Around 1000 AD, Tongan and Samoan navigators — including women trained in the closely guarded art of star navigation — completed the settlement of the vast Polynesian Triangle, reaching as far as Rapa Nui (Easter Island), Hawaiʻi, and Aotearoa (New Zealand). These voyagers used no instruments, instead reading star paths, ocean swells, bird flight patterns, and phosphorescent currents to cross thousands of miles of open ocean. The navigational knowledge was encoded in oral chants and closely held by navigator lineages, making it invisible to later European scholars who assumed the settlements were accidental drift voyages.", "why_forgotten": "European colonial scholars, led by Andrew Sharp's influential 1956 thesis, dismissed intentional Polynesian voyaging as impossible, insisting Pacific islands were settled by accident. This prejudice erased one of humanity's greatest navigational achievements for decades. Additionally, because the knowledge was oral and often held by women and lower-ranking navigators whose names went unrecorded, it lacked the written documentation Western historians privileged.", "why_it_matters": "The 1976 voyage of Hōkūleʻa, a reconstructed Polynesian canoe that sailed from Hawaiʻi to Tahiti using traditional navigation, finally vindicated indigenous knowledge and sparked a Pacific-wide cultural renaissance still reshaping identity politics today. Modern wayfinding science, including studies on spatial cognition and non-instrument navigation used in AI pathfinding algorithms, draws directly on Polynesian techniques. The event also fundamentally challenges Eurocentric narratives about who mastered the oceans first — Polynesians crossed the Pacific centuries before Europeans crossed the Atlantic.", "entry_number": 12, "date_added": "2026-06-27"}, {"title": "The Persian Engineer Who Cooled the Desert", "date": "400 BCE", "location": "Persia (modern-day Kerman Province, Iran)", "era": "Ancient", "topic_tags": ["engineering", "thermodynamics", "sustainability"], "event_summary": "Ancient Persian engineers perfected the yakhchāl, a massive domed evaporative cooling structure that could produce and store ice in the middle of the desert without electricity or modern refrigeration. Using precise knowledge of thermal mass, windcatchers, and underground channels fed by qanāts, builders in cities like Sirjan and Meymand created ice in freezing desert nights and preserved it through brutal summers. The structures served entire communities, storing food and providing chilled water to rich and poor alike across the Achaemenid Empire.", "why_forgotten": "Western histories of technology typically begin with European and American industrial invention, casting refrigeration as a 19th-century breakthrough by figures like Jacob Perkins and Carl von Linde. Persian contributions to thermodynamic engineering were dismissed as primitive or quaint rather than recognized as sophisticated applied physics. Colonial-era scholarship systematically undervalued non-European technological achievement, and the yakhchāl's elegant simplicity made it easy to overlook as mere architecture.", "why_it_matters": "Modern sustainable architects and engineers are now directly studying yakhchāl designs and qanat-based passive cooling systems as models for zero-energy refrigeration in an era of climate crisis. The principles behind these 2,400-year-old structures inform cutting-edge research into evaporative cooling, thermal mass construction, and off-grid food preservation across Africa, South Asia, and the Middle East. The yakhchāl is a stark reminder that the most consequential engineering breakthroughs are sometimes not invented but rediscovered.", "entry_number": 11, "date_added": "2026-06-27"}, {"title": "The Indian Mathematician Who Invented Zero", "date": "August 25, 628 AD", "location": "Ujjain, India", "era": "Medieval", "topic_tags": ["mathematics", "intellectual history", "India"], "event_summary": "In 628 AD, the mathematician and astronomer Brahmagupta completed his treatise Brāhmasphuṭasiddhānta at the astronomical center of Ujjain, in which he became the first person in recorded history to formally define zero as a number and lay out arithmetic rules for its use — including operations with negative numbers. He described zero not as a mere placeholder but as the result of subtracting a number from itself, and systematically defined how to add, subtract, and multiply with it. This single intellectual leap transformed mathematics from a descriptive tool into an abstract symbolic language capable of infinite expansion.", "why_forgotten": "Western mathematical histories long credited the concept of zero vaguely to 'Arab mathematicians' or even to European adoption, obscuring its specifically Indian origin. Colonial-era historiography systematically minimized South Asian intellectual contributions, preferring a narrative in which Greek and later European thinkers drove all foundational advances. Brahmagupta's name remains virtually unknown outside specialist circles, even though his work underpins every calculation performed on Earth today.", "why_it_matters": "Without Brahmagupta's formalization of zero, the entire architecture of modern mathematics, computing, physics, and engineering would not exist — binary code, calculus, algebra, and digital technology all depend on zero as a defined number. His rules for negative numbers also laid the groundwork for concepts like debt, temperature scales, and coordinate geometry. Every time a computer processes a single bit of data, it silently relies on a framework first articulated by a seventh-century Indian scholar in a provincial court.", "entry_number": 10, "date_added": "2026-06-27"}, {"title": "The Chinese Eunuch Who Burned a Fleet", "date": "1433", "location": "Nanjing, China", "era": "Medieval", "topic_tags": ["maritime exploration", "Chinese history", "isolationism"], "event_summary": "Following the death of the Xuande Emperor, Confucian officials in the Ming court, led by Vice President of the Ministry of War Liu Daxia, ordered the destruction or suppression of Zheng He's detailed navigational charts and records of his seven massive voyages across the Indian Ocean, Southeast Asia, and East Africa. The treasure fleet — comprising ships that dwarfed anything Europe would build for another century — was left to rot in Nanjing's dockyards. China's most advanced oceangoing capability was deliberately dismantled within a single generation.", "why_forgotten": "The destruction was so thorough that it succeeded on its own terms: later Chinese historians had little material to work with, and the voyages became a footnote rather than a turning point. Western historiography, focused on European Age of Exploration narratives, had no incentive to highlight that China had explored first and then voluntarily withdrew. The event was an absence — the deliberate non-happening of Chinese global expansion — which is harder to remember than action.", "why_it_matters": "Had China maintained its naval supremacy, the Portuguese, Spanish, and Dutch would have encountered a dominant Chinese maritime presence across the Indian Ocean, potentially preventing European colonial empires from forming as they did. The decision to turn inward reshaped the entire global balance of power for centuries, enabling Europe's unchallenged expansion into Asia and Africa. Modern China's Belt and Road Initiative is explicitly framed by Chinese scholars as a resumption of Zheng He's maritime legacy — making this 600-year-old bureaucratic decision a living force in contemporary geopolitics.", "entry_number": 9, "date_added": "2026-06-26"}, {"title": "The Ethiopian Who Defeated European Colonialism", "date": "March 1, 1896", "location": "Adwa, Ethiopia", "era": "Modern", "topic_tags": ["colonialism", "African sovereignty", "international law"], "event_summary": "Empress Taytu Betul personally commanded a force of cannoneers and strategically cut off Italian water supplies at the Battle of Adwa, a decisive move that helped Emperor Menelik II's Ethiopian forces annihilate an invading Italian army of 17,000. While Menelik is sometimes remembered, Taytu's pivotal military and diplomatic role—including her famous refusal of the Treaty of Wuchale's Italian-language version that would have made Ethiopia a protectorate—was the catalyst that made the battle inevitable. Her words to the Italian envoy, 'We will not consent,' set the entire confrontation in motion.", "why_forgotten": "European colonial powers had every incentive to minimize the story of an African woman outmaneuvering European diplomats and commanding troops to a crushing victory. Italian historiography buried the humiliation for decades, and Western narratives of the 'Scramble for Africa' preferred to portray the continent as passive. Taytu was further erased by later Ethiopian male-centered political narratives under Haile Selassie's court historians.", "why_it_matters": "Ethiopia remained the only African nation never formally colonized, becoming a powerful symbol for Pan-African movements worldwide, directly inspiring Marcus Garvey, the Rastafari movement, and African independence leaders from Kwame Nkrumah to Nelson Mandela. Taytu's diplomatic rejection of a deliberately mistranslated treaty established an early precedent about the sanctity of treaty language in international law, a principle still invoked at the International Court of Justice today.", "entry_number": 8, "date_added": "2026-06-25"}, {"title": "The Postal Worker Who Mapped Cholera", "date": "August 31, 1854", "location": "Soho, London, England", "era": "Modern", "topic_tags": ["epidemiology", "data visualization", "public health"], "event_summary": "During a catastrophic cholera outbreak in London's Soho district, physician John Snow partnered with Reverend Henry Whitehead — a local curate who knew every family on every street — to conduct door-to-door interviews tracing each death back to a single contaminated water pump on Broad Street. On September 7, 1854, Snow persuaded the Board of Guardians of St. James's Parish to remove the pump handle, and the outbreak collapsed. What is almost never told is that it was Whitehead, not Snow, who provided the crucial case that sealed the argument: he traced the index case to a mother at 40 Broad Street who had washed her sick infant's soiled diapers into a cesspool just three feet from the well.", "why_forgotten": "Snow gets occasional credit in medical circles, but Whitehead's indispensable role — and the fact that the parish board nearly refused to act because miasma theory dominated elite opinion — is rarely taught. The story was also politically inconvenient: it exposed London's water companies as complicit in mass death, and authorities quietly buried the full parliamentary testimony. The episode fell outside both military and political history, making it invisible in standard curricula.", "why_it_matters": "This single investigation invented modern epidemiology, contact tracing, and the use of geographic data mapping to fight disease — methods deployed in every pandemic since, including COVID-19. Snow and Whitehead's work also forced the complete reconstruction of London's sewer system under Joseph Bazalgette, a template copied by cities worldwide, arguably saving more lives than any medical discovery in history. The Broad Street pump episode remains the founding case study of public health infrastructure as a human right.", "entry_number": 7, "date_added": "2026-06-24"}, {"title": "The Widow Who Invented Champagne", "date": "1816", "location": "Reims, France", "era": "Early Modern", "topic_tags": ["food history", "women in science", "innovation"], "event_summary": "In 1816, Barbe-Nicole Clicquot Ponsardin — the 'Veuve Clicquot' — perfected the riddling technique (remuage) that solved champagne's fatal flaw: cloudy sediment that made sparkling wine unpredictable and often explosive. She invented a specially angled desk (pupitre) where bottles were gradually rotated and tilted until dead yeast collected in the neck and could be cleanly expelled. This single innovation transformed champagne from a murky, unreliable curiosity into the crystal-clear luxury drink that conquered global markets.", "why_forgotten": "History credits champagne's origin to the monk Dom Pérignon, a convenient male figurehead, while Clicquot's decisive technical breakthrough is reduced to a brand logo. The broader pattern of attributing women's industrial innovations to tradition, luck, or male predecessors ensured her engineering genius was flattened into a mere business success story. French national mythology preferred romantic origin tales over the unglamorous reality of fermentation science.", "why_it_matters": "Riddling remains the foundational process for virtually all méthode traditionnelle sparkling wine worldwide, from Cava to Crémant to high-end California bubbles — a multi-billion-dollar global industry resting on one widow's invention. Clicquot also pioneered one of history's first luxury brand empires, personally smuggling shipments through Napoleon's blockades to capture the Russian market, creating a template for global luxury marketing still studied in business schools. Her story is one of the clearest cases of a woman's technical invention being hidden in plain sight behind a corporate label.", "entry_number": 6, "date_added": "2026-06-23"}, {"title": "The Earthquake That Birthed Modern Seismology", "date": "November 1, 1755", "location": "Lisbon, Portugal", "era": "Early Modern", "topic_tags": ["natural disaster", "philosophy", "science"], "event_summary": "On All Saints' Day 1755, a massive earthquake estimated at 8.5-9.0 magnitude struck Lisbon, followed by a tsunami and raging fires that killed between 30,000 and 50,000 people and obliterated 85% of the city. The Marquis of Pombal, Sebastião José de Carvalho e Melo, sent a systematic questionnaire to every parish in Portugal asking about the quake's timing, aftershocks, and water behavior — creating the first empirical seismological survey in history. He then rebuilt Lisbon using the world's first earthquake-resistant construction techniques, including a wooden lattice frame called the 'gaiola pombalina' that was tested by having soldiers march around models to simulate tremors.", "why_forgotten": "The philosophical shockwave — Voltaire's 'Candide,' Kant's three essays on seismology, the collapse of Leibnizian optimism — is taught in philosophy courses, but Pombal's radical empirical response is almost never discussed. His survey and engineering innovations are overshadowed by the disaster narrative itself, and Pombal's later authoritarian rule made him a complicated figure that Portuguese and European historiography preferred to simplify rather than celebrate.", "why_it_matters": "Pombal's parish questionnaire became the direct template for how governments worldwide investigate natural disasters, essentially inventing the field of seismology as a data-driven science decades before it had a name. His earthquake-resistant 'gaiola' frame anticipated modern seismic engineering principles still used in earthquake-prone cities today. The event also fundamentally rewired Enlightenment philosophy away from theodicy and toward empiricism, quietly shaping the intellectual foundations of modern secular governance and scientific disaster response.", "entry_number": 5, "date_added": "2026-06-22"}, {"title": "The Japanese Castaway Who Opened America", "date": "January 1841", "location": "Torishima Island, Japan / New Bedford, Massachusetts, USA", "era": "Early Modern", "topic_tags": ["cross-cultural contact", "diplomacy", "Japan-US relations"], "event_summary": "A 14-year-old Japanese fisherman named Nakahama Manjirō was shipwrecked on a desolate volcanic island and rescued by the American whaling ship John Howland, captained by William Whitfield. Whitfield brought the boy to Fairhaven, Massachusetts, where Manjirō became the first Japanese person to live and be educated in the United States, learning English, navigation, and democratic principles. He eventually returned to Japan in 1851, where his unprecedented knowledge of American language and culture made him indispensable during the tumultuous years that followed.", "why_forgotten": "Manjirō's story is overshadowed by the dramatic narrative of Commodore Perry's 'opening' of Japan in 1853, which receives nearly all the credit in textbooks. Japanese authorities initially treated Manjirō with deep suspicion upon his return, and his contributions were deliberately minimized by Tokugawa officials who did not want to credit a low-born fisherman with shaping foreign policy. In American history, he is simply absent from the Perry narrative entirely.", "why_it_matters": "When Perry's Black Ships arrived, Manjirō was one of the only people in all of Japan who could translate English and explain American intentions, customs, and technology, directly shaping the negotiations that ended two centuries of isolation. His knowledge influenced the Meiji reformers who transformed Japan into a modern industrial power within a single generation. The entire trajectory of US-Japan relations — from alliance to rivalry to the postwar partnership — traces back in part to a rescued teenage fisherman who bridged two civilizations before anyone else could.", "entry_number": 4, "date_added": "2026-06-21"}, {"title": "The Monk Who Saved Arabic Numbers", "date": "999 AD", "location": "Reims, France / Rome", "era": "Medieval", "topic_tags": ["mathematics", "knowledge transfer", "papacy"], "event_summary": "Gerbert of Aurillac, a French monk who had studied in Muslim Catalonia, was elected Pope Sylvester II — the first French pope. During his earlier years teaching at Reims, he had introduced the Hindu-Arabic numeral system, the abacus, and Arab astronomical instruments to Latin Europe, concepts he had absorbed from Islamic scholars in the Marca Hispanica. His papacy gave unprecedented institutional legitimacy to these 'foreign' mathematical tools at a moment when Christian Europe was deeply suspicious of Islamic learning.", "why_forgotten": "After his death in 1003, political rivals and Church chroniclers spread rumors that Gerbert had been a sorcerer who made a pact with the devil — specifically because of his Arabic-derived knowledge. This slander persisted for centuries, discouraging scholars from crediting him. His critical role as a bridge between Islamic and European intellectual traditions was eclipsed by later figures like Fibonacci, who reintroduced the same numeral system two centuries later and received most of the historical credit.", "why_it_matters": "Without Gerbert's early championing, the mathematical infrastructure that eventually enabled European banking, navigation, engineering, and science might have been delayed by generations or taken an entirely different path. The Hindu-Arabic numerals he popularized are the universal language of computation today — every digital device, financial system, and scientific equation on Earth relies on the notation he fought to transplant from the Islamic world into a resistant Christendom.", "entry_number": 3, "date_added": "2026-06-20"}, {"title": "The Slave Who Inoculated Boston", "date": "June 1721", "location": "Boston, Massachusetts (Colonial America) — originating from West Africa", "era": "Early Modern", "topic_tags": ["medicine", "slavery", "epidemiology"], "event_summary": "During a devastating smallpox epidemic in Boston, an enslaved West African man named Onesimus told his owner, the Puritan minister Cotton Mather, about a practice from his homeland: deliberately introducing material from a smallpox pustule into a small wound to produce immunity. Mather convinced Dr. Zabdiel Boylston to试 the technique, and Boylston inoculated 248 people, of whom only six died — a fatality rate dramatically lower than the epidemic's natural 15% death rate. The experiment provoked violent backlash: someone hurled a grenade through Mather's window, and both men were publicly vilified.", "why_forgotten": "Onesimus was enslaved, and the white historical narrative credited Mather and Boylston while erasing the African knowledge tradition entirely. The idea that a enslaved African possessed superior medical knowledge contradicted the racial ideologies used to justify slavery, making his contribution deeply inconvenient. Even today, most accounts of vaccination history skip directly from folk practices to Edward Jenner's 1796 cowpox experiments, leaving a 75-year gap.", "why_it_matters": "Onesimus's testimony provided the first empirical proof of inoculation in the Western world and laid the intellectual groundwork for the entire modern vaccine paradigm. The Boston experiment's statistical success — one of the earliest uses of comparative mortality data — helped establish evidence-based medicine. In an era of global vaccine hesitancy, recognizing that immunization's Western debut depended on African indigenous knowledge reframes debates about whose science counts and who is credited with saving millions of lives.", "entry_number": 2, "date_added": "2026-06-19"}, {"title": "TheEli Imbecile Law That Sterilized Thousands", "date": "November 1907", "location": "Indiana, United States — but its true impact radiated to Japan, Scandinavia, and Nazi Germany", "era": "Modern", "topic_tags": ["eugenics", "reproductive rights", "legal history"], "event_summary": "On March 9, 1907, Indiana Governor J. Frank Hanly signed the world's first compulsory sterilization law, drafted largely by physician Harry C. Sharp of the Indiana Reformatory in Jeffersonville. The law authorized the forced sterilization of 'confirmed criminals, idiots, imbeciles, and rapists' in state institutions. Sharp had already been illegally sterilizing inmates since 1899, performing vasectomies on hundreds of young men he deemed 'defective.'", "why_forgotten": "After the horrors of Nazi eugenic programs were exposed in 1945, American states quietly distanced themselves from their own sterilization histories. Indiana's pioneering role was deliberately downplayed in civic memory; the law was rarely mentioned in state education, and institutional records were sealed or destroyed. The broader American eugenics movement was reframed as a fringe curiosity rather than mainstream policy endorsed by the Supreme Court in Buck v. Bell (1927).", "why_it_matters": "Indiana's 1907 law became the direct legislative model for sterilization statutes in 32 U.S. states and at least 30 countries, including Sweden (which sterilized 63,000 people through 1975), Japan (whose Eugenics Protection Law operated until 1996), and most infamously Nazi Germany, whose 1933 Law for the Prevention of Hereditarily Diseased Offspring explicitly cited American statutes as precedent. The legal and ethical debates it ignited still shape modern fights over reproductive autonomy, disability rights, and the boundaries of state power over human bodies.", "entry_number": 1, "date_added": "2026-06-18"}];

let currentEra = 'all';
let selectedIndex = null;

function setEra(era, btn) {
  currentEra = era;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let filtered = ALL_ENTRIES.filter(e => {
    const matchEra = currentEra === 'all' || e.era === currentEra;
    const matchQ = !q ||
      e.title.toLowerCase().includes(q) ||
      e.location.toLowerCase().includes(q) ||
      e.event_summary.toLowerCase().includes(q) ||
      (e.topic_tags || []).some(t => t.toLowerCase().includes(q));
    return matchEra && matchQ;
  });

  if (sort === 'oldest') filtered = [...filtered].reverse();
  else if (sort === 'az') filtered = [...filtered].sort((a,b) => a.title.localeCompare(b.title));

  renderList(filtered);
}

function renderList(entries) {
  const list = document.getElementById('entry-list');
  document.getElementById('entry-count').textContent =
    ALL_ENTRIES.length === 1
      ? '1 entry in the archive'
      : ALL_ENTRIES.length + ' entries in the archive';

  if (!entries.length) {
    list.innerHTML = '<p class="no-results">No entries match your search.</p>';
    return;
  }

  list.innerHTML = entries.map((e) => `
    <div class="entry-item ${selectedIndex === e.entry_number ? 'selected' : ''}"
         onclick="showDetail(${JSON.stringify(e).replace(/'/g, '&apos;')}, ${e.entry_number})">
      <div class="entry-num">#${String(e.entry_number).padStart(3,'0')} &nbsp;·&nbsp; ${e.date_added || ''}</div>
      <div class="entry-title">${e.title}</div>
      <div class="entry-meta">
        <span>${e.date}</span>
        <span>${e.location}</span>
        <span>${e.era}</span>
      </div>
      <div>${(e.topic_tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function showDetail(entry, num) {
  selectedIndex = num;
  document.querySelectorAll('.entry-item').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-eyebrow">Entry #${String(entry.entry_number).padStart(3,'0')}</div>
    <h2 class="detail-title">${entry.title}</h2>
    <p class="detail-dateline">${entry.date} &nbsp;·&nbsp; ${entry.location} &nbsp;·&nbsp; ${entry.era}</p>
    <p class="detail-section-label">What happened</p>
    <p class="detail-text">${entry.event_summary}</p>
    <p class="detail-section-label">Why it was forgotten</p>
    <p class="detail-text">${entry.why_forgotten}</p>
    <p class="detail-section-label">Why it actually matters</p>
    <p class="detail-text">${entry.why_it_matters}</p>
    <div class="detail-tags">
      ${(entry.topic_tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
    </div>
  `;

  document.getElementById('detail-pane').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-pane').classList.remove('open');
}

applyFilters();
</script>
